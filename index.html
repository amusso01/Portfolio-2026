<!doctype html>
<html lang="en">
	<!--
  =============================================================================
  PORTFOLIO SITE - HTML ENTRY POINT
  =============================================================================
-->
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://challenges.cloudflare.com" crossorigin />
		<link rel="preload" as="image" href="/AM.webp" type="image/webp" />
		<link
			rel="preload"
			as="font"
			href="/fonts/alexandria-latin-variable.woff2"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			as="font"
			href="/fonts/space-grotesk-latin-variable.woff2"
			type="font/woff2"
			crossorigin
		/>
		<title>Andrea Musso – Senior Web Developer</title>
		<meta
			name="description"
			content="Building Digital Commerce Experiences. Web developer with 10+ years experience in e-commerce, Shopify, WordPress, and front-end development. Based in London, UK. Available for freelance."
		/>
		<link
			rel="icon"
			type="image/png"
			href="%PUBLIC_URL%/favicon-96x96.png"
			sizes="96x96"
		/>
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="shortcut icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="AM Site" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Andrea Musso – Senior Web Developer" />
		<meta
			property="og:description"
			content="Building Digital Experiences. Web developer with 10+ years experience in e-commerce, Shopify, WordPress, and front-end development. London, UK."
		/>
	</head>

	<body style="margin: 0; padding: 0">
		<noscript>
			<div
				style="
					min-height: 100vh;
					display: flex;
					align-items: center;
					justify-content: center;
					padding: 24px;
					background: #000;
					color: #fff;
					font-family: 'Space Grotesk', sans-serif;
				"
			>
				<div
					style="
						max-width: 640px;
						display: flex;
						flex-direction: column;
						gap: 12px;
						text-align: center;
					"
				>
					<p
						style="
							margin: 0;
							font-size: 11px;
							letter-spacing: 0.4em;
							text-transform: uppercase;
							opacity: 0.6;
						"
					>
						JavaScript Required
					</p>
					<h1
						style="
							margin: 0;
							font-family: 'Space Grotesk', sans-serif;
							font-size: clamp(32px, 7vw, 56px);
							line-height: 1;
							letter-spacing: 0.08em;
						"
					>
						Andrea Musso
					</h1>
					<p style="margin: 0; font-size: 18px; line-height: 1.6;">
						This portfolio needs JavaScript enabled to load the interactive experience.
					</p>
					<p style="margin: 0; font-size: 16px; line-height: 1.6; opacity: 0.8;">
						If JavaScript is unavailable, you can still get in touch at
						<a
							href="mailto:hello@andreamusso.com"
							style="color: inherit; font-weight: 600;"
						>
							hello@andreamusso.com
						</a>
						.
					</p>
				</div>
			</div>
		</noscript>
		<!-- React app mounts here - createRoot() attaches to this div -->
		<div id="root"></div>
		<!-- type="module" enables ES6 imports; Vite resolves /src/main.tsx -->
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
